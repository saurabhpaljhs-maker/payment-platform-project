# Alertmanager Configuration — Payment Platform
global:
  resolve_timeout: 5m
  slack_api_url: '{{ slack_api_url }}'   # Injected from Secret Manager

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: 'slack-default'

  routes:
    # Critical payment alerts — page on-call immediately
    - match:
        severity: critical
        team: payments
      receiver: 'pagerduty-payments-oncall'
      group_wait: 0s
      repeat_interval: 30m

    # Critical infra — page platform team
    - match:
        severity: critical
        team: platform-devops
      receiver: 'pagerduty-platform-oncall'
      group_wait: 10s

    # All warnings — Slack only
    - match:
        severity: warning
      receiver: 'slack-payments-warnings'
      repeat_interval: 2h

receivers:
  - name: 'slack-default'
    slack_configs:
      - channel: '#payments-alerts'
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Service:* {{ .Labels.service }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}
        send_resolved: true

  - name: 'pagerduty-payments-oncall'
    pagerduty_configs:
      - service_key: '{{ pagerduty_payments_key }}'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          runbook: '{{ .CommonAnnotations.runbook }}'

  - name: 'slack-payments-warnings'
    slack_configs:
      - channel: '#payments-warnings'
        send_resolved: true

inhibit_rules:
  # If critical fires, suppress warning for same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
