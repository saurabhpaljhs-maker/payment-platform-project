# ServiceAccount for payment microservices — uses GKE Workload Identity
# Maps to GCP Service Account with minimal required permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: payments
  annotations:
    # Workload Identity binding — no key files needed
    iam.gke.io/gcp-service-account: payment-service@payments-platform-prod.iam.gserviceaccount.com
  labels:
    app: payment-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-service-role
  namespace: payments
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-service-rolebinding
  namespace: payments
subjects:
  - kind: ServiceAccount
    name: payment-service-sa
    namespace: payments
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: payment-service-role
